name: Send water reminders

# Runs every 30 minutes, for free, using GitHub's own runners — no Firebase
# billing account required. The script itself decides per-user whether a
# reminder is actually due (see scripts/send-water-reminders.mjs).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Send reminders
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node send-water-reminders.mjs
